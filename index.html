<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CodeScanner</title>

    <!-- PWA: Theme & iOS -->
    <meta name="theme-color" content="#0C111A" />

    <!-- Theme-Bootstrap (vor dem ersten Paint, verhindert Flash):
         1. ?theme=dark|light|system aus der URL übernehmen (so kann die
            Portfolio-Seite den aktuellen Mode beim Klick mitgeben) und in
            localStorage persistieren.
         2. Gespeicherte Präferenz (oder System) auf <html data-theme> anwenden.
         3. <meta theme-color> passend setzen, damit auch die Browser-/OS-Leiste
            zum Mode passt. tokens.css und src/theme/theme.ts übernehmen danach. -->
    <script>
      (function () {
        try {
          var KEY = 'theme';
          var q = new URL(window.location.href).searchParams.get('theme');
          if (q === 'dark' || q === 'light') localStorage.setItem(KEY, q);
          else if (q === 'system') localStorage.removeItem(KEY);

          var saved = localStorage.getItem(KEY);
          var pref = saved === 'dark' || saved === 'light' ? saved : 'system';
          var dark = pref === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
            : pref === 'dark';

          var el = document.documentElement;
          if (pref === 'system') el.removeAttribute('data-theme');
          else el.setAttribute('data-theme', pref);

          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#0C111A' : '#FFFFFF');
        } catch (e) { /* localStorage/URL nicht verfügbar → Defaults greifen */ }
      })();
    </script>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CodeScanner" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- PWA-Domain-Gate: bindet Manifest + Service Worker nur ein, wenn der
         Nutzer von einer erlaubten Domain kommt. Bewusst KEIN statischer
         <link rel="manifest"> hier. -->
    <script src="/pwa-gate.js?v=2"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Mindest-Fenstergröße der installierten App: 1280 × 780.
         Web-Apps können das OS-Fenster nicht hart begrenzen, daher:
         a) best-effort Auto-Resize auf die äußere Fenstergröße,
         b) Blockier-Overlay, falls der Browser das Resizing verweigert.
         Steuerung erfolgt per JS (siehe Script unten), gemessen an
         window.outerWidth / outerHeight, nur im installierten Zustand. -->
    <style>
      #min-size-gate { display: none; }
      html.min-size-block #min-size-gate {
        display: flex;
        position: fixed; inset: 0; z-index: 2147483647;
        align-items: center; justify-content: center;
        padding: 24px; text-align: center;
        background: #0C111A; color: #fff;
        font-family: 'Figtree', system-ui, -apple-system, sans-serif;
      }
      html.min-size-block #root { display: none; }
      #min-size-gate .msg { max-width: 440px; }
      #min-size-gate strong { display: block; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
      #min-size-gate p { font-size: 15px; line-height: 1.55; opacity: 0.75; margin: 0; }

      /* Down-Scaling auf Design-Basis 1440 × 1000, ohne Balken:
         Faktor = min(vw/1440, vh/1000). Die knappere Achse trifft damit exakt
         die Design-Größe, die andere Achse bleibt fluid (Bühne = Viewport ÷
         Faktor) und füllt das Fenster komplett. Bei ≥ 1440 × 1000 fehlt die
         Klasse → normales fluides Verhalten. Bewusst unlayered → schlägt die
         Tailwind-Utilities w-screen / h-screen ohne !important.
         --app-scale / --stage-w / --stage-h kommen aus dem Script. */
      html.app-scaled,
      html.app-scaled body { overflow: hidden; }
      html.app-scaled #root {
        position: fixed;
        top: 0; left: 0;
        width: var(--stage-w, 1440px);
        height: var(--stage-h, 1000px);
        transform: scale(var(--app-scale, 1));
        transform-origin: top left;
      }
      /* App-Rahmen füllt die Bühne statt des echten Viewports. */
      html.app-scaled .w-screen { width: 100%; }
      html.app-scaled .h-screen { height: 100%; }
    </style>
  </head>
  <body>
    <div id="min-size-gate" role="alertdialog" aria-modal="true" aria-label="Fenster zu klein">
      <div class="msg">
        <strong>Fenster zu klein</strong>
        <p>Bitte vergrößere das Fenster auf mindestens 1280&nbsp;×&nbsp;780&nbsp;Pixel, um den CodeScanner zu nutzen.</p>
      </div>
    </div>

    <script>
      (function () {
        var MIN_W = 1280, MIN_H = 780;

        function installed() {
          return window.matchMedia('(display-mode: standalone)').matches ||
                 window.matchMedia('(display-mode: minimal-ui)').matches ||
                 window.navigator.standalone === true;
        }

        function tooSmall() {
          return window.outerWidth < MIN_W || window.outerHeight < MIN_H;
        }

        function setBlocked(b) {
          document.documentElement.classList.toggle('min-size-block', b);
        }

        function evaluate() {
          // Im Browser-Tab / iframe nie blockieren.
          if (!installed()) { setBlocked(false); return; }

          if (tooSmall()) {
            // Best-effort: Fenster auf Mindestgröße zurückschnappen.
            try {
              window.resizeTo(
                Math.max(window.outerWidth, MIN_W),
                Math.max(window.outerHeight, MIN_H)
              );
            } catch (e) { /* vom Browser blockiert */ }
          }

          // Nach dem Resize-Versuch erneut messen und Overlay setzen.
          setTimeout(function () { setBlocked(tooSmall()); }, 60);
        }

        var t;
        function schedule() { clearTimeout(t); t = setTimeout(evaluate, 120); }

        window.addEventListener('resize', schedule);
        window.addEventListener('load', evaluate);
        // Display-Mode-Wechsel (Installieren / Deinstallieren) erneut prüfen.
        window.matchMedia('(display-mode: standalone)').addEventListener('change', evaluate);
        evaluate();
      })();
    </script>

    <!-- Down-Scaling: App auf die feste Bühne 1440 × 1000 rechnen, sobald der
         Viewport kleiner ist. Faktor = min(vw/1440, vh/1000), nie über 1. -->
    <script>
      (function () {
        var BASE_W = 1440, BASE_H = 1000;
        var el = document.documentElement;
        function apply() {
          var vw = window.innerWidth, vh = window.innerHeight;
          var scale = Math.min(vw / BASE_W, vh / BASE_H);
          if (scale < 1) {
            // Bühne = Viewport ÷ Faktor → skaliert füllt sie exakt das Fenster.
            el.style.setProperty('--app-scale', String(scale));
            el.style.setProperty('--stage-w', vw / scale + 'px');
            el.style.setProperty('--stage-h', vh / scale + 'px');
            el.classList.add('app-scaled');
          } else {
            el.classList.remove('app-scaled');
            el.style.removeProperty('--app-scale');
            el.style.removeProperty('--stage-w');
            el.style.removeProperty('--stage-h');
          }
        }
        var t;
        window.addEventListener('resize', function () { clearTimeout(t); t = setTimeout(apply, 80); });
        window.addEventListener('orientationchange', apply);
        window.addEventListener('load', apply);
        apply();
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
