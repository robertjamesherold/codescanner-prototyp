# Netlify-Konfiguration für den CodeScanner-Prototyp (Vite/React SPA + Functions)
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API → Netlify Function (muss VOR dem SPA-Fallback stehen, erste Übereinstimmung gewinnt).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA-Fallback: alle übrigen Routen auf index.html (Client-Routing via react-router).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Iframe-Einbettung auf die eigene Webseite beschränken (Eltern-Domain).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://robertjamesherold.com https://www.robertjamesherold.com"
